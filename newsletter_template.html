<!DOCTYPE html>
<html>
<head>
  <title>Newsletter Template</title>
  <style>
    body {
      background: #fff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .newsletter-image {
      max-width: 80vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border-radius: 16px;
      background: #fff;
      padding: 16px;
      display: block;
    }
    @media (max-width: 600px) {
      .newsletter-image {
        max-width: 98vw;
        padding: 4px;
      }
    }
  </style>
</head>
<body>
  <!-- Use the PNG image for best compatibility. If you want to embed the PDF, use an <embed> or <iframe> below instead. -->
  <a href="https://solutions.dnaforsuccess.com/3minute-step1-1">
    <img src="NewsletterTemplate.png" alt="Newsletter Template" class="newsletter-image">
  </a>
  <!--
  To use the PDF instead, uncomment below and comment out the <img> above:
  <embed src="NewsletterTemplate.pdf" type="application/pdf" width="80%" height="600px" style="background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08);">
  -->
</body>
</html>
